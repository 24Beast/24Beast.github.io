<script type="text/javascript">
    var names = ["Bhanu Tokas","a ML Developer","an Ethical Hacking Enthusiast","a Web Developer Amateur"]
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    async function type(){
        while(1){
            for (name in names){
                for (var i = 0;i<names[name].length;i++){
                    document.getElementById("Role").innerHTML += names[name].charAt(i);
                    await sleep(200);
                }
                for (var i = 0;i<names[name].length;i++){
                    document.getElementById("Role").innerHTML = document.getElementById("Role").innerHTML.slice(0,-1);
                    await sleep(200);
                }
            }
        }
    }
    type()
</script>
